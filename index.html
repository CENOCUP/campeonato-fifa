<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA Admin Dashboard</title>
    <style>
        :root { --bg: #080808; --card: #111; --neon: #00ff87; --text: #fff; --dim: #888; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .dashboard { width: 100%; max-width: 1100px; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-left: 5px solid var(--neon); padding-left: 15px; }
        
        .table-container { background: var(--card); border-radius: 15px; padding: 20px; overflow-x: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { text-align: left; color: var(--dim); font-size: 0.7rem; text-transform: uppercase; padding: 15px; border-bottom: 2px solid #222; }
        td { padding: 12px 15px; border-bottom: 1px solid #1a1a1a; }
        
        .btn-admin { background: var(--neon); color: #000; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .admin-panel { display: none; background: #1a1a1a; padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid var(--neon); }
        
        input { background: #222; border: 1px solid #444; color: #fff; padding: 8px; border-radius: 4px; width: 60px; margin: 5px; }
        .input-nome { width: 120px; }
        
        .save-btn { background: #fff; color: #000; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 10px; width: 100%; font-weight: bold; }
        .pts-col { color: var(--neon); font-weight: bold; }
        .desempenho { color: var(--neon); background: rgba(0,255,135,0.1); padding: 4px 8px; border-radius: 4px; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="dashboard">
    <header>
        <div>
            <h1>FIFA <span style="color: var(--neon)">RANKING</span></h1>
            <p style="color: var(--dim)">Gerenciador de Campeonato</p>
        </div>
        <button class="btn-admin" onclick="toggleAdmin()">⚙️ MODO ADMIN</button>
    </header>

    <div id="adminPanel" class="admin-panel">
        <h3>Editar Jogadores e Resultados</h3>
        <div id="formJogadores"></div>
        <button onclick="addJogador()" style="background:none; border: 1px dashed var(--neon); color: var(--neon); padding: 10px; cursor:pointer; width: 100%; margin-bottom: 10px;">+ Adicionar Novo Jogador</button>
        <button class="save-btn" onclick="salvarDados()">SALVAR E ATUALIZAR RANKING</button>
    </div>

    <div class="table-container">
        <table id="tabela-ranking">
            <thead>
                <tr>
                    <th>Pos</th>
                    <th>Jogador</th>
                    <th>Pts</th>
                    <th>V</th>
                    <th>E</th>
                    <th>D</th>
                    <th>GF</th>
                    <th>GS</th>
                    <th>SG</th>
                    <th>Desempenho (Bônus)</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    // Carrega dados iniciais do LocalStorage ou usa padrão
    let jogadores = JSON.parse(localStorage.getItem('fifa_data')) || [
        { nome: "Thiago", v: 0, e: 0, d: 0, gf: 0, gs: 0 },
        { nome: "Felipe", v: 0, e: 0, d: 0, gf: 0, gs: 0 }
    ];

    function toggleAdmin() {
        const panel = document.getElementById('adminPanel');
        panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        renderForm();
    }

    function renderForm() {
        const container = document.getElementById('formJogadores');
        container.innerHTML = jogadores.map((j, i) => `
            <div style="margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px;">
                <input type="text" class="input-nome" value="${j.nome}" onchange="updateVal(${i}, 'nome', this.value)">
                V: <input type="number" value="${j.v}" onchange="updateVal(${i}, 'v', this.value)">
                E: <input type="number" value="${j.e}" onchange="updateVal(${i}, 'e', this.value)">
                D: <input type="number" value="${j.d}" onchange="updateVal(${i}, 'd', this.value)">
                GF: <input type="number" value="${j.gf}" onchange="updateVal(${i}, 'gf', this.value)">
                GS: <input type="number" value="${j.gs}" onchange="updateVal(${i}, 'gs', this.value)">
                <button onclick="removerJogador(${i})" style="color:red; background:none; border:none; cursor:pointer;">✖</button>
            </div>
        `).join('');
    }

    function updateVal(idx, key, val) {
        jogadores[idx][key] = key === 'nome' ? val : parseInt(val) || 0;
    }

    function addJogador() {
        jogadores.push({ nome: "Novo", v: 0, e: 0, d: 0, gf: 0, gs: 0 });
        renderForm();
    }

    function removerJogador(idx) {
        jogadores.splice(idx, 1);
        renderForm();
    }

    function salvarDados() {
        localStorage.setItem('fifa_data', JSON.stringify(jogadores));
        calcularERenderizar();
        toggleAdmin();
    }

    function calcularERenderizar() {
        const tbody = document.querySelector("#tabela-ranking tbody");
        
        let ranking = jogadores.map(j => {
            const ptsBase = (j.v * 3) + (j.e * 1);
            const sg = j.gf - j.gs;
            return { ...j, ptsBase, sg };
        });

        // Ordenação
        ranking.sort((a, b) => b.ptsBase - a.ptsBase || b.sg - a.sg);

        // Bônus
        ranking = ranking.map((j, index) => {
            let bonusPos = (index === 0) ? 20 : (index === 1) ? 15 : (index === 2) ? 10 : 0;
            let bonusGols = (j.gf * 2.5) + (j.gs * -2);
            return { ...j, desempenho: (bonusPos + bonusGols).toFixed(1) };
        });

        tbody.innerHTML = ranking.map((j, i) => `
            <tr>
                <td style="color:${i==0?'gold':'#888'}">${i+1}º</td>
                <td class="nome">${j.nome}</td>
                <td class="pts-col">${j.ptsBase}</td>
                <td>${j.v}</td>
                <td>${j.e}</td>
                <td>${j.d}</td>
                <td>${j.gf}</td>
                <td>${j.gs}</td>
                <td>${j.sg}</td>
                <td><span class="desempenho">${j.desempenho} pts</span></td>
            </tr>
        `).join('');
    }

    calcularERenderizar();
</script>

</body>
</html>
